name: Ejecutar Pruebas E2E Cypress
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analizar código con SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Instalar las dependencias
        run: npm install

      - name: Ejecutar las pruebas de Cypress (Modo consola)
        run: npx cypress run